# cargo-deny 配置：依赖审计门禁（docs/08-engineering.md 门禁#5）

[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    # Mozilla CA 根证书数据（webpki-roots，reqwest/rustls TLS 出站用）；
    # 宽松数据许可，仅覆盖证书清单数据本身
    "CDLA-Permissive-2.0",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
# workspace 内部 path 依赖（version 由 workspace 统一）不算 wildcard
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
