<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Login</title>
</head>
<body>
  <h1>Login</h1>
  <form action="/welcome" method="get">
    <label>Username <input type="text" name="username"></label>
    <label>Password <input type="password" name="password"></label>
    <button type="submit">Sign in</button>
  </form>
  <script>
    // e2e 状态快照往返用：进入登录页即写入会话状态
    document.cookie = "visited=login; path=/";
    try { localStorage.setItem("draft_user", "alice"); } catch (_) {}
  </script>
</body>
</html>
